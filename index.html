<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Paice · Research Consultancy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --white:    #FFFFFF;
            --grey-50:  #F9F9F8;
            --grey-200: #DDDBD7;
            --grey-500: #8A8680;
            --grey-700: #4A4844;
            --ink:      #1A1917;
            --amber:    #B45309;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--grey-50);
            color: var(--ink);
            font-size: 15px;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .sl {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 1.1s cubic-bezier(0.22,1,0.36,1),
                        transform 1.1s cubic-bezier(0.22,1,0.36,1);
        }
        body.loaded .sl { opacity: 1; transform: none; }
        .sl.d1 { transition-delay: 0.1s; }
        .sl.d2 { transition-delay: 0.25s; }
        .sl.d3 { transition-delay: 0.4s; }
        .sl.d4 { transition-delay: 0.55s; }

        .card {
            background: var(--white);
            border: 1px solid var(--grey-200);
            border-radius: 4px;
            padding: 3.5rem 4rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }

        .eyebrow {
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 500;
            color: var(--grey-500);
            display: block;
            margin-bottom: 1.4rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 1.4rem;
        }

        .divider {
            width: 2.5rem;
            height: 1px;
            background: var(--grey-200);
            margin: 1.6rem auto;
        }

        p {
            color: var(--grey-700);
            font-size: 0.9rem;
            line-height: 1.75;
            margin-bottom: 1.8rem;
        }

        a.email {
            display: inline-block;
            font-size: 0.82rem;
            letter-spacing: 0.04em;
            color: var(--amber);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        a.email:hover { border-color: var(--amber); }

        footer {
            margin-top: 2.5rem;
            font-size: 0.72rem;
            color: var(--grey-500);
            letter-spacing: 0.04em;
        }

        @media (max-width: 560px) {
            .card { padding: 2.5rem 1.8rem; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <span class="eyebrow sl d1">Andrew Paice</span>
    <h1 class="sl d2">Website coming soon.</h1>
    <div class="divider sl d3"></div>
    <p class="sl d3">Research &amp; Statistical Consultancy, serving UK charities and EdTech organisations. In the meantime, get in touch directly.</p>
    <a href="mailto:hello@andrewpaice.co.uk" class="email sl d4">hello@andrewpaice.co.uk</a>
</div>

<footer class="sl d4">© 2026 Andrew Paice · andrewpaice.co.uk</footer>

<script>
    requestAnimationFrame(() => {
        requestAnimationFrame(() => document.body.classList.add('loaded'));
    });
</script>

</body>
</html>
